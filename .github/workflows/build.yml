name: build

# CI on every push/PR cross-compiles all router arches (the build signal). On a v* tag a
# single release job rebuilds every arch and attaches the per-SoC tarballs DIRECTLY to the
# GitHub Release. It deliberately does NOT use actions/upload-artifact: Actions artifact
# storage is a small, account-wide quota (shared across every repo) that fills up and then
# fails releases, whereas Release assets are separate and don't draw on it. No artifacts are
# uploaded anywhere, so a release can never be blocked by the artifact quota again.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Run the JS-based actions on the runner's bundled Node 24 (Node 20 is
  # deprecated). The self-hosted runner ships node24; this opts in now.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'  # >= 1.26.5: GO-2026-5856 (crypto/tls ECH leak) fixed here
          cache: false
      - run: go vet ./...
      - run: go test -race ./...   # race detector (host build, CGO default on)

  # Push/PR cross-compile signal: build + package every arch so a regression that breaks any
  # SoC build (or the packaging) fails CI. Skipped on tags — the release job below rebuilds
  # them there. Uploads nothing (no artifact-quota dependency).
  build:
    needs: test
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Router SoC families (Keenetic/Entware + OpenWrt/Asus-Merlin):
          - { name: mipsle, goarch: mipsle, gomips: softfloat }  # MediaTek MT7621 etc. (most Keenetic)
          - { name: mips,   goarch: mips,   gomips: softfloat }  # big-endian MIPS
          - { name: arm,    goarch: arm,    goarm: '7' }         # ARMv7 (Cortex-A7/A9)
          - { name: arm64,  goarch: arm64 }                      # ARMv8 (aarch64)
          - { name: amd64,  goarch: amd64 }                      # x86-64 (VPS/testing)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'  # >= 1.26.5: GO-2026-5856 (crypto/tls ECH leak) fixed here
          cache: false
      - name: Cross-compile + package ${{ matrix.name }}
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail
          version="0.0.0-dev+$(git rev-parse --short HEAD)"
          stage="wayhop-${{ matrix.name }}-pkg"
          mkdir -p "$stage"
          go build -trimpath \
            -ldflags "-s -w -X wayhop/internal/version.Version=${version}" \
            -o "$stage/wayhop-${{ matrix.name }}" ./cmd/wayhop
          # Entware /opt tarball
          cp packaging/install.sh packaging/uninstall.sh packaging/S99wayhop "$stage/"
          chmod +x "$stage"/*.sh "$stage"/S99wayhop "$stage/wayhop-${{ matrix.name }}"
          tar -C "$stage" -czf "wayhop-${version}-${{ matrix.name }}.tar.gz" .
          # OpenWrt native tarball
          owstage="wayhop-${{ matrix.name }}-openwrt-pkg"
          mkdir -p "$owstage"
          cp "$stage/wayhop-${{ matrix.name }}" "$owstage/wayhop-${{ matrix.name }}"
          cp packaging/openwrt/install.sh packaging/openwrt/uninstall.sh packaging/openwrt/wayhop.init "$owstage/"
          chmod +x "$owstage"/*.sh "$owstage"/wayhop.init "$owstage/wayhop-${{ matrix.name }}"
          tar -C "$owstage" -czf "wayhop-${version}-${{ matrix.name }}-openwrt.tar.gz" .

  # Tag-only: rebuild every arch in one job and create the GitHub Release with the tarballs
  # attached as RELEASE ASSETS (not Actions artifacts). One job → deterministic SHA256SUMS and
  # no matrix race to create the release.
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write   # create the release + upload assets
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'  # >= 1.26.5: GO-2026-5856 (crypto/tls ECH leak) fixed here
          cache: false
      # Release gate: the installer/uninstaller scripts + maintainer hooks run as root on user
      # routers — a ShellCheck regression must block the release, not just ci.yml (which does not
      # gate publishing). Cheapest possible: lint only the shipped shell, fail the release on any finding.
      - name: shellcheck packaging scripts (release gate)
        run: |
          set -euo pipefail
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y shellcheck; }
          # --severity=warning: block real defects (unquoted expansions, rm-rf risks, …) but not
          # info-level style notes (e.g. SC2015 on an intentional `A && B || true`), which vary by
          # shellcheck version across runners and would make the gate flaky.
          shellcheck -S warning packaging/*.sh packaging/openwrt/*.sh packaging/S99wayhop packaging/openwrt/wayhop.init
          shellcheck -S warning -s sh packaging/feed/*.sh \
                     packaging/feed/postinst packaging/feed/postinst.apk packaging/feed/postinst.entware \
                     packaging/feed/prerm packaging/feed/prerm.apk packaging/feed/prerm.entware packaging/feed/postupgrade.apk
      - name: Build every arch + package
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          # Release manifest is signed with the same usign key as the package feed (its .pub is
          # embedded in bootstrap.sh + committed at packaging/feed/keys/wayhop.pub). Reusing the
          # feed secret means no extra provisioning; point this at a dedicated secret to split them.
          WAYHOP_RELEASE_SIGN_KEY: ${{ secrets.VELINX_USIGN_SEC }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # SINGLE SOURCE OF TRUTH: the release tag must equal internal/version/version.go's Version.
          gover="$(sed -n 's/.*Version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' internal/version/version.go | head -n1)"
          if [ "$gover" != "$version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} (v$version) does not match version.go ($gover) — bump version.go to the release version and re-tag"; exit 1
          fi
          mkdir -p dist
          build_one() {  # name goarch [gomips] [goarm]
            local name="$1" stage owstage
            stage="wayhop-${name}-pkg"; owstage="wayhop-${name}-openwrt-pkg"
            mkdir -p "$stage" "$owstage"
            GOARCH="$2" GOMIPS="${3:-}" GOARM="${4:-}" go build -trimpath \
              -ldflags "-s -w -X wayhop/internal/version.Version=${version}" \
              -o "$stage/wayhop-${name}" ./cmd/wayhop
            cp packaging/install.sh packaging/uninstall.sh packaging/S99wayhop "$stage/"
            chmod +x "$stage"/*.sh "$stage"/S99wayhop "$stage/wayhop-${name}"
            tar -C "$stage" -czf "dist/wayhop-${version}-${name}.tar.gz" .
            cp "$stage/wayhop-${name}" "$owstage/wayhop-${name}"
            cp packaging/openwrt/install.sh packaging/openwrt/uninstall.sh packaging/openwrt/wayhop.init "$owstage/"
            chmod +x "$owstage"/*.sh "$owstage"/wayhop.init "$owstage/wayhop-${name}"
            tar -C "$owstage" -czf "dist/wayhop-${version}-${name}-openwrt.tar.gz" .
            ( cd dist && sha256sum "wayhop-${version}-${name}.tar.gz" "wayhop-${version}-${name}-openwrt.tar.gz" )
          }
          build_one mipsle mipsle softfloat
          build_one mips   mips   softfloat
          build_one arm    arm    ''        7
          build_one arm64  arm64
          build_one amd64  amd64
          # --- native packages for the release: opkg .ipk (one per OpenWrt CPU-family token) + Entware
          #     .ipk (one per Entware token), via the SAME pack scripts the signed feed uses, so a
          #     release .ipk is byte-for-byte a feed .ipk (offline `opkg install ./wayhop_*.ipk`). ---
          export SOURCE_DATE_EPOCH=0
          mkdir -p bins pkgs
          for n in mipsle mips arm arm64 amd64; do cp "wayhop-${n}-pkg/wayhop-${n}" "bins/wayhop-${n}"; done
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue ;; esac
            ow="${line%%|*}"; ew="${line##*|}"
            # shellcheck disable=SC2086
            set -- $ow; goname="$1"; shift; owtokens="$*"
            ewtoken="$(printf '%s' "$ew" | tr -d ' ')"
            # shellcheck disable=SC2086
            sh packaging/feed/pack-ipk.sh     "bins/wayhop-$goname" "${version}" 1 pkgs/ipk     $owtokens
            sh packaging/feed/pack-entware.sh "bins/wayhop-$goname" "${version}" 1 pkgs/entware "$ewtoken"
          done < packaging/feed/arch-map.txt
          find pkgs -name '*.ipk' -exec cp {} dist/ \;
          echo "packages built:"; ls -1 dist/*.ipk
          # --- apk (OpenWrt 25.12+) — BEST-EFFORT (apk-tools v3 lives only in an Alpine-edge container).
          #     Wrapped so it can never fail the release; the opkg/Entware .ipk above are the guaranteed set.
          ( set +e
            # Gate on actual daemon ACCESS, not just the binary: a runner with docker installed but
            # an unreadable /var/run/docker.sock (permission denied) would otherwise reach `docker run`
            # and fail the release — apk is best-effort, the .ipk + tarballs are the guaranteed set.
            { command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; } || { echo "::notice::docker unavailable (absent or socket not accessible) — apk packages skipped (best-effort)"; exit 0; }
            docker run --rm -v "$PWD:/w" -w /w alpine:edge sh -euc '
              apk add --no-cache apk-tools >/dev/null 2>&1 || true
              apk mkpkg --help >/dev/null 2>&1 || { echo "apk-tools v3 unavailable — apk skipped"; exit 0; }
              v="'"${version}"'"
              while IFS= read -r line; do
                case "$line" in ""|\#*) continue ;; esac
                ow="${line%%|*}"; set -- $ow; goname="$1"; shift; owtokens="$*"
                sh packaging/feed/pack-apk.sh "bins/wayhop-$goname" "$v" 1 pkgs $owtokens || true
              done < packaging/feed/arch-map.txt
            '
            find pkgs -name '*.apk' -exec cp {} dist/ \;
          ) || echo "::warning::apk build skipped (best-effort) — opkg + Entware .ipk still shipped"
          # `|| true`: when a glob (e.g. *.apk on a no-docker runner) matches nothing it stays literal,
          # so the final `[ -e "*.apk" ]` fails — which, as the loop's last command under `set -e`,
          # would kill the step even though every real tarball/.ipk hashed fine. Never let it.
          ( cd dist && for f in *.tar.gz *.ipk *.apk; do [ -e "$f" ] && sha256sum "$f" || true; done > SHA256SUMS.txt )
          # Online one-command installer. Unversioned asset name so the copy-paste
          # `releases/latest/download/bootstrap.sh` one-liner always resolves; kept out
          # of SHA256SUMS.txt (which lists only the tarballs the bootstrap verifies).
          cp packaging/bootstrap.sh dist/bootstrap.sh
          # Sign the manifest so a mirror can't swap the binary and its checksum together. Uses usign
          # (Ed25519, openssl-free) so routers verify it natively with usign/signify — see bootstrap.sh.
          # Secret-gated: with no signing key the manifest ships unsigned (bootstrap still enforces the
          # SHA-256 over the GitHub-HTTPS download). See docs/RELEASE_SIGNING.md.
          if [ -n "${WAYHOP_RELEASE_SIGN_KEY:-}" ]; then
            printf '%s' "$WAYHOP_RELEASE_SIGN_KEY" > "$RUNNER_TEMP/relsign.sec"
            go build -trimpath -o "$RUNNER_TEMP/usigntool" ./packaging/feed/usigntool
            "$RUNNER_TEMP/usigntool" sign -sec "$RUNNER_TEMP/relsign.sec" -m dist/SHA256SUMS.txt -out dist/SHA256SUMS.txt.sig
            rm -f "$RUNNER_TEMP/relsign.sec"
            echo "signed SHA256SUMS.txt -> SHA256SUMS.txt.sig (usign/Ed25519)"
          else
            echo "::notice::no WAYHOP_RELEASE_SIGN_KEY secret set — shipping an unsigned manifest"
          fi
      - name: Verify the release is complete (no partial publish)
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          missing=0
          for name in mipsle mips arm arm64 amd64; do
            for suffix in "" "-openwrt"; do
              f="dist/wayhop-${version}-${name}${suffix}.tar.gz"
              [ -f "$f" ] || { echo "::error::missing release asset: $f"; missing=1; }
            done
          done
          # the Entware .ipk set is deterministic (no docker); requiring all five proves the pack loop
          # ran (the opkg .ipk are built in the same loop). apk stays best-effort and is not gated.
          for tok in aarch64-3.10 armv7sf-k3.2 mipselsf-k3.4 mips-3.4 x86-64-3.2; do
            f="dist/wayhop_${version}-1_${tok}.ipk"
            [ -f "$f" ] || { echo "::error::missing Entware package: $f"; missing=1; }
          done
          for f in dist/SHA256SUMS.txt dist/bootstrap.sh; do
            [ -f "$f" ] || { echo "::error::missing release asset: $f"; missing=1; }
          done
          [ "$missing" = 0 ] || { echo "release is INCOMPLETE — refusing to publish"; exit 1; }
          echo "all required assets present:"; ls -1 dist
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          extra="dist/*.ipk"
          [ -f dist/SHA256SUMS.txt.sig ] && extra="$extra dist/SHA256SUMS.txt.sig"
          ls dist/*.apk >/dev/null 2>&1 && extra="$extra dist/*.apk"
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/SHA256SUMS.txt dist/bootstrap.sh $extra \
            --repo "${GITHUB_REPOSITORY}" \
            --title "WayHop ${GITHUB_REF_NAME}" \
            --generate-notes
