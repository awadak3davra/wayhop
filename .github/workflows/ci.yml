name: ci

# Comprehensive per-element quality gates. Complements build.yml (which runs the
# unit tests, cross-compiles the 5 router arches, and publishes releases). Here we
# add the checks build.yml lacks: format/vet, fuzzing, the real sing-box config
# validation for every protocol, source-builds of the engine binaries WayHop
# orchestrates (so a broken/upgraded olcRTC or amneziawg-go is caught in CI), and
# static analysis: golangci-lint (informational) + govulncheck / shellcheck / gitleaks (BLOCKING).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 5 * * 1'   # weekly — catches upstream engine-build breakage with no push
  workflow_dispatch:

permissions:
  contents: read

env:
  # Both the quality gates here and the release builds in build.yml run on the same
  # Go 1.26 (patched stdlib); go.mod's `go 1.22` is only the language-version floor.
  GO_VERSION: '1.26.5'  # >= 1.26.5: GO-2026-5856 (crypto/tls ECH privacy leak) fixed here
  # Run the JS-based actions on the runner's bundled Node 24 (Node 20 is
  # deprecated). The self-hosted runner ships node24; this opts in now.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # --- format + vet (blocking) + static analysis (informational) ---
  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}', cache: false}
      - name: gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint (informational)
        continue-on-error: true
        uses: golangci/golangci-lint-action@v8
        with: { version: v2.12.2 }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  # --- fuzz the parsers (each target a short smoke run) ---
  fuzz:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}', cache: false}
      - name: Fuzz smoke (untrusted-input parsers)
        run: |
          set -euo pipefail
          go test -run=^$ -fuzz=^FuzzParse$             -fuzztime=25s ./internal/importer/
          go test -run=^$ -fuzz=^FuzzParseSubscription$ -fuzztime=25s ./internal/importer/
          # The other pasted-config importers (their doc-contract is "never panic/hang on untrusted input").
          go test -run=^$ -fuzz=^FuzzParseClash$        -fuzztime=25s ./internal/importer/
          go test -run=^$ -fuzz=^FuzzParseConf$         -fuzztime=25s ./internal/importer/
          go test -run=^$ -fuzz=^FuzzParseSingbox$      -fuzztime=25s ./internal/importer/
          go test -run=^$ -fuzz=^FuzzExportRoundTrip$   -fuzztime=25s ./internal/exporter/
          go test -run=^$ -fuzz=^FuzzExportOddParams$   -fuzztime=25s ./internal/exporter/
          # IPTV M3U parser: fed arbitrary upstream + user-supplied (Xtream/custom) playlists.
          go test -run=^$ -fuzz=^FuzzParse$             -fuzztime=25s ./internal/iptv/

  # --- validate the embedded vanilla-JS UI (build.yml embeds web/dist into the binary but never
  # exercises the JS, so a SyntaxError or a broken i18n dict would ship a broken UI on a green build) ---
  ui:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - name: node --check every embedded dist script
        run: |
          set -euo pipefail
          for f in web/dist/*.js; do node --check "$f"; echo "  ok: $f"; done
      - name: i18n completeness (every language has every IPTV key, placeholders preserved)
        run: node scripts/check-i18n.mjs
      - name: a11y contract (burger aria-expanded, apply-banner live region, nav guard, redaction)
        run: node scripts/check-a11y.mjs

  # --- shellcheck the install / init scripts (BLOCKING) ---
  scripts:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck packaging scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck packaging/*.sh packaging/openwrt/*.sh \
                     packaging/S99wayhop packaging/openwrt/wayhop.init
          # the feed pack scripts + maintainer scripts run as ROOT on user routers — lint them too
          shellcheck -s sh packaging/feed/*.sh \
                     packaging/feed/postinst packaging/feed/postinst.apk packaging/feed/postinst.entware \
                     packaging/feed/prerm packaging/feed/prerm.apk packaging/feed/prerm.entware packaging/feed/postupgrade.apk

  # --- secret scanning (informational until the fixture allowlist is proven quiet) ---
  # The feed SIGNING keys live only in GitHub secrets + off-repo backup; this is the
  # backstop that flags a *.sec / PEM / token that ever lands in the tree OR history.
  secrets:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }   # full history so a secret in an OLD commit is caught too
      - name: gitleaks (tree + history)
        run: |
          set -euo pipefail
          ver='8.21.2'
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1

  # --- validate EVERY protocol against the real sing-box core, on BOTH the
  # deployed 1.12.x line AND 1.13.x (which REMOVED the legacy wireguard outbound).
  # Native WireGuard is emitted as a top-level `endpoints` entry, so the
  # all-protocols config must pass `sing-box check` on both — this matrix proves
  # the schema is forward-compatible past the 1.13 removal. ---
  singbox-check:
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        # 1.12.17 = the version on the AX3000T today; 1.13.13 = the line that
        # removed the wireguard outbound. Bump deliberately when WayHop moves.
        singbox: ['1.12.17', '1.13.13']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}', cache: false}
      - name: Fetch sing-box ${{ matrix.singbox }}
        run: |
          set -euo pipefail
          ver='${{ matrix.singbox }}'
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${ver}/sing-box-${ver}-linux-amd64.tar.gz" -o sb.tgz
          tar -xzf sb.tgz
          echo "WR_SINGBOX=$PWD/sing-box-${ver}-linux-amd64/sing-box" >> "$GITHUB_ENV"
      # Explicit allowlist, NOT the whole package: TestHybridSingBoxCheck is intentionally excluded
      # because `sing-box check` on a hybrid config initializes TUN auto-redirect, which needs a
      # router (nftables) environment and FATALs "auto-redirect: invalid argument" on a CI runner.
      # Add any new sing-box-gated generator test to this list.
      - name: sing-box ${{ matrix.singbox }} check on all-protocols + transport + clash + WG-conf configs
        run: go test -run 'TestAllProtocolsGenerate|TestGeneratorTransportMatrix|TestClashSubscriptionGenerate|TestWireGuardConfGenerate|TestSourceRuleSingBoxCheck' -count=1 ./internal/generator/

  # --- validate the clash subscription EXPORT against the real mihomo (clash-meta) client ---
  # The export was previously only round-trip tested (re-imported into WayHop); this runs
  # `mihomo -t` on a generated subscription (incl. the failover proxy-groups) so a field a real
  # clash client rejects is caught before users are. mihomo is pinned; bump deliberately.
  clash-export-check:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: '${{ env.GO_VERSION }}', cache: false}
      - name: Fetch mihomo
        run: |
          set -euo pipefail
          ver='1.19.27'
          curl -fsSL "https://github.com/MetaCubeX/mihomo/releases/download/v${ver}/mihomo-linux-amd64-compatible-v${ver}.gz" -o mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo
          echo "WR_MIHOMO=$PWD/mihomo" >> "$GITHUB_ENV"
      - name: mihomo -t on the exported clash subscription
        run: go test -run TestClashExportMihomo -count=1 ./internal/exporter/

  # --- source-build the engine binaries WayHop orchestrates ---
  # Heavy (olcRTC pulls a large WebRTC stack and needs Go 1.26), so it is skipped
  # on PRs to keep them fast and runs on push / the weekly schedule / manual.
  engines:
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Linux, X64]
    steps:
      # cache:false like every other job — this job builds EXTERNAL clones (awg/olc),
      # so there is nothing in this repo for setup-go to cache, and a stale module-cache
      # tarball on the self-hosted runner was failing the restore (tar exit 2).
      - uses: actions/setup-go@v6
        with: { go-version: '1.26.5', cache: false }   # olcRTC go.mod requires go 1.26.3; amneziawg-go builds on it too; 1.26.5 fixes GO-2026-5856
      - name: amneziawg-go binary cross-builds (arm64)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-go awg
          cd awg
          # Build the binary (.), NOT ./... — a transitive dep (outline-sdk/x/smart)
          # fails to cross-compile but is not imported by the amneziawg-go binary.
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/amneziawg-go .
      - name: olcRTC cross-builds (arm64 + mipsle)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/openlibrecommunity/olcrtc olc
          cd olc
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64           go build -trimpath -ldflags '-s -w' -o /tmp/olcrtc-arm64  ./cmd/olcrtc
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -o /tmp/olcrtc-mipsle ./cmd/olcrtc
          ls -la /tmp/olcrtc-arm64 /tmp/olcrtc-mipsle
