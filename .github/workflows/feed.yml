name: feed

# Build + sign + publish the native package feed (opkg .ipk + Entware + apk .apk) to the
# awadak3davra/wayhop-feed GitHub Pages site. Runs on a v* release tag, or manually for validation.
# The opkg/Entware path is the verified core; the apk path is best-effort until apk-tools v3 is pinned.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'version to package (no leading v); blank = latest release tag'
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  feed:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false

      - name: Resolve version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -eu
          if printf '%s' "${GITHUB_REF_NAME:-}" | grep -q '^v[0-9]'; then
            v="${GITHUB_REF_NAME#v}"
          elif [ -n "${INPUT_VERSION:-}" ]; then
            v="${INPUT_VERSION#v}"
          else
            v="$(gh release view -R "$GITHUB_REPOSITORY" --json tagName -q .tagName | sed 's/^v//')"
          fi
          [ -n "$v" ] || { echo "could not resolve a version" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "packaging WayHop $v"

      - name: Build per-arch binaries
        env:
          CGO_ENABLED: '0'
          GOOS: linux
        run: |
          set -eu
          v="${{ steps.ver.outputs.version }}"
          mkdir -p bins
          build() { GOARCH="$2" GOMIPS="${3:-}" GOARM="${4:-}" go build -trimpath \
            -ldflags "-s -w -X wayhop/internal/version.Version=$v" -o "bins/wayhop-$1" ./cmd/wayhop; }
          build mipsle mipsle softfloat
          build mips   mips   softfloat
          build arm    arm    ''        7
          build arm64  arm64
          build amd64  amd64
          go build -o bins/usigntool ./packaging/feed/usigntool
          ls -la bins

      - name: Pack opkg (.ipk) + Entware
        run: |
          set -eu
          v="${{ steps.ver.outputs.version }}"
          export SOURCE_DATE_EPOCH=0
          mkdir -p feed
          # arch-map lines:  goname  openwrt-tokens...  |  entware-token
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue ;; esac
            ow="${line%%|*}"; ew="${line##*|}"
            # shellcheck disable=SC2086
            set -- $ow
            goname="$1"; shift; owtokens="$*"
            ewtoken="$(printf '%s' "$ew" | tr -d ' ')"
            # shellcheck disable=SC2086
            sh packaging/feed/pack-ipk.sh     "bins/wayhop-$goname" "$v" 1 feed/ipk     $owtokens
            sh packaging/feed/pack-entware.sh "bins/wayhop-$goname" "$v" 1 feed/entware "$ewtoken"
          done < packaging/feed/arch-map.txt

      - name: Sign opkg indexes (usign)
        run: |
          set -eu
          umask 077
          printf '%s' "${{ secrets.VELINX_USIGN_SEC }}" > "$RUNNER_TEMP/wayhop.sec"
          sh packaging/feed/make-index.sh feed "$RUNNER_TEMP/wayhop.sec" bins/usigntool
          rm -f "$RUNNER_TEMP/wayhop.sec"

      - name: Pack apk (.apk) + index — best-effort (needs apk-tools v3 in a container)
        id: apk
        continue-on-error: true
        run: |
          set -eu
          v="${{ steps.ver.outputs.version }}"
          command -v docker >/dev/null 2>&1 || { echo "::warning::no docker on runner — skipping apk feed (opkg feed still published)"; exit 0; }
          printf '%s' "${{ secrets.VELINX_APK_SEC_PEM }}" > "$PWD/.apk-sign.pem"
          # apk-tools v3 (apk mkpkg/mkndx/adbsign) is not in Alpine stable; try edge's apk-tools.
          docker run --rm -v "$PWD:/w" -w /w alpine:edge sh -euc '
            apk add --no-cache apk-tools >/dev/null 2>&1 || true
            if ! apk mkpkg --help >/dev/null 2>&1; then
              echo "::warning::apk mkpkg unavailable (apk-tools v3 not present) — apk feed skipped"; exit 0
            fi
            v="'"$v"'"
            while IFS= read -r line; do
              case "$line" in ""|\#*) continue ;; esac
              ow="${line%%|*}"; set -- $ow; goname="$1"; shift; owtokens="$*"
              sh packaging/feed/pack-apk.sh "bins/wayhop-$goname" "$v" 1 feed $owtokens
            done < packaging/feed/arch-map.txt
            for d in feed/apk/*/; do
              [ -d "$d" ] || continue
              ( cd "$d" && apk mkndx -o packages.adb ./*.apk && apk adbsign --sign-key /w/.apk-sign.pem packages.adb )
            done
          '
          rm -f "$PWD/.apk-sign.pem"

      - name: Assemble feed root (keys + landing page)
        run: |
          set -eu
          rm -f "$PWD/.apk-sign.pem" 2>/dev/null || true
          cp packaging/feed/keys/wayhop.pub          feed/wayhop.pub
          cp packaging/feed/keys/wayhop-apk.pem.pub  feed/wayhop-apk.pem.pub
          touch feed/.nojekyll
          BASE="https://awadak3davra.github.io/wayhop-feed"
          {
            echo "<!doctype html><meta charset=utf-8><title>WayHop package feed</title>"
            echo "<style>body{font:15px/1.5 system-ui,sans-serif;max-width:820px;margin:2rem auto;padding:0 1rem;color:#1a2230}"
            echo "h1{margin:.2rem 0}code,pre{background:#0b0e13;color:#e6edf3;border-radius:6px}"
            echo "pre{padding:.8rem 1rem;overflow:auto}code{padding:.1rem .35rem}a{color:#0097dc}.v{color:#6b7684}</style>"
            echo "<h1>WayHop package feed</h1>"
            echo "<p class=v>Native OpenWrt / Entware / Keenetic packages for <a href=https://github.com/awadak3davra/wayhop>WayHop</a>"
            echo " &mdash; <b>${{ steps.ver.outputs.version }}</b>. Prefer a one-shot install instead? See the"
            echo " <a href=https://github.com/awadak3davra/wayhop#install>README install guide</a>.</p>"
            echo "<h2>OpenWrt 24.10+ &middot; apk</h2>"
            echo "<pre>wget -O /etc/apk/keys/wayhop.pem $BASE/wayhop-apk.pem.pub"
            echo "echo \"$BASE/apk/\$(cat /etc/apk/arch)\" &gt;&gt; /etc/apk/repositories.d/wayhop.list"
            echo "apk update &amp;&amp; apk add wayhop</pre>"
            echo "<h2>OpenWrt 23.x / Entware / Keenetic &middot; opkg</h2>"
            echo "<pre>wget -O /tmp/wayhop.pub $BASE/wayhop.pub &amp;&amp; opkg-key add /tmp/wayhop.pub"
            echo "echo \"src/gz wayhop $BASE/ipk/\$(opkg print-architecture | awk 'NR==2{print \$2}')\" &gt;&gt; /etc/opkg/customfeeds.conf"
            echo "opkg update &amp;&amp; opkg install wayhop</pre>"
            echo "<p class=v>Then open <code>http://&lt;router-ip&gt;:8088</code>. Upgrades: <code>apk add -u wayhop</code> / <code>opkg upgrade wayhop</code>."
            echo " Your <code>/etc/wayhop</code> config is never touched on upgrade or removal.</p>"
          } > feed/index.html
          echo "feed tree:"; find feed -maxdepth 3 -type f | sort

      # peaceiris/actions-gh-pages hard-codes ssh-agent's socket at /tmp/ssh-auth.sock. On a
      # PERSISTENT self-hosted runner that path survives between jobs, so a prior feed run leaves a
      # stale socket and the next deploy dies on "cannot bind ... Address already in use". Clear any
      # stale agent + socket first so the deploy is idempotent across runs on the same runner.
      - name: Clear stale ssh-agent socket (self-hosted runner hygiene)
        run: |
          pkill -f 'ssh-agent -a /tmp/ssh-auth.sock' 2>/dev/null || true
          rm -f /tmp/ssh-auth.sock || true

      - name: Deploy to wayhop-feed Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.FEED_DEPLOY_KEY }}
          external_repository: awadak3davra/wayhop-feed
          publish_branch: gh-pages
          publish_dir: ./feed
          force_orphan: true
          commit_message: "WayHop feed ${{ steps.ver.outputs.version }}"
