<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WayHop</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<!-- Mobile nav drawer toggle (CSS-only): the hamburger label flips this checkbox,
     which CSS uses (body:has(.nav-toggle:checked)) to slide the sidebar in. -->
<input type="checkbox" id="navtoggle" class="nav-toggle" aria-hidden="true">
<label for="navtoggle" class="nav-scrim" aria-hidden="true"></label>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">WH</div>
      <div>
        <div class="bt">WayHop</div>
        <div class="bs">proxy control</div>
      </div>
    </div>
    <div class="nav-item" data-page="dashboard"><span class="ico">▤</span> Dashboard</div>
    <div class="nav-item" data-page="server"><span class="ico">⊕</span> Set up Server</div>
    <div class="nav-item" data-page="connections"><span class="ico">⇄</span> Connections</div>
    <div class="nav-item" data-page="failover"><span class="ico">⛃</span> Failover</div>
    <div class="nav-item" data-page="routing"><span class="ico">⋔</span> Routing</div>
    <div class="nav-item" data-page="dns"><span class="ico">⚇</span> DNS</div>
    <div class="nav-item" data-page="updater"><span class="ico">⭳</span> Updater</div>
    <div class="nav-item" data-page="diagnostics"><span class="ico">⚠</span> Diagnostics</div>
    <div class="nav-item" data-page="plugins"><span class="ico">⧉</span> Plugins</div>
    <div class="nav-item" data-page="settings"><span class="ico">⚙</span> Settings</div>
    <div class="grow"></div>
    <div class="foot" id="foot">wayhop —</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <label for="navtoggle" class="nav-burger" aria-label="Menu">&#9776;</label>
      <div class="title" id="pagetitle">Dashboard</div>
      <div class="spacer"></div>
      <span class="pill muted" id="statuspill"><span class="dot"></span><span id="statustext">…</span></span>
      <button class="btn btn-ghost" id="applybtn" title="Apply live — not saved, reverts on reboot or if connectivity drops">Apply</button>
      <button class="btn btn-primary" id="applysavebtn" title="Apply and persist as the saved baseline">Apply &amp; Save</button>
    </header>
    <div id="failsafe-banner" style="display:none;padding:14px 24px 0"></div>
    <div id="apply-error" style="display:none"></div>
    <div class="content" id="view"></div>
  </main>
</div>

<div class="toasts" id="toasts" role="status" aria-live="polite" aria-atomic="false"></div>
<script src="i18n.js"></script>
<script src="iptv-i18n.js"></script>
<script src="nav.js"></script>
<script src="app.js"></script>
</body>
</html>
